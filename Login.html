<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>🔐 تسجيل الدخول</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب</button>

  <p id="message"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc",
      authDomain: "aclds-app.firebaseapp.com",
      projectId: "aclds-app",
      storageBucket: "aclds-app.appspot.com",
      messagingSenderId: "391599013116",
      appId: "1:391599013116:web:fef6ffb35d884990b9ab79"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "home.html";
        })
        .catch(error => {
          document.getElementById("message").innerText = error.message;
        });
    }

    window.register = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          document.getElementById("message").innerText = "تم إنشاء الحساب ✅";
        })
        .catch(error => {
          document.getElementById("message").innerText = error.message;
        });
    }
  </script>

</body>
</html>
