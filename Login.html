<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 100px;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 200px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>🔐 تسجيل الدخول</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">دخول</button>
  <button onclick="register()">إنشاء حساب</button>

  <p id="msg"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc",
      authDomain: "aclds-app.firebaseapp.com",
      projectId: "aclds-app",
      storageBucket: "aclds-app.appspot.com",
      messagingSenderId: "391599013116",
      appId: "1:391599013116:web:fef6ffb35d884990b9ab79"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        document.getElementById("msg").innerText = "تم تسجيل الدخول ✅";
        window.location.href = "dashboard.html";
      } catch (error) {
        document.getElementById("msg").innerText = error.message;
      }
    };

    window.register = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        document.getElementById("msg").innerText = "تم إنشاء الحساب ✅";
      } catch (error) {
        document.getElementById("msg").innerText = error.message;
      }
    };
  </script>

</body>
</html>
