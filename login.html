<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<style>
body {
  background: #000;
  color: #fff;
  text-align: center;
  font-family: Arial;
}
input {
  padding: 10px;
  margin: 10px;
  width: 80%;
}
button {
  padding: 10px 20px;
  background: green;
  color: white;
  border: none;
}
</style>
</head>
<body>

<h2>تسجيل الدخول</h2>

<input type="text" id="user" placeholder="الاسم"><br>
<input type="password" id="pass" placeholder="كلمة السر"><br>

<button onclick="login()">دخول</button>

<script>
function login() {
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user === "admin" && pass === "1234") {
    window.location.href = "dashboard.html";
  } else {
    alert("معلومات خاطئة");
  }
}
</script>

</body>
</html>
