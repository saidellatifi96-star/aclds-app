<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">

  <style>
    body {

      padding: 10px 20px;

<body>

  <h1>👋 مرحبا بك</h1>
  <p id="userEmail"></p>

  <button onclick="logout()">تسجيل الخروج</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc",
      authDomain: "aclds-app.firebaseapp.com",
      projectId: "aclds-app",
      storageBucket: "aclds-app.appspot.com",
      messagingSenderId: "391599013116",
      appId: "1:391599013116:web:fef6ffb35d884990b9ab79"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 🔒 حماية الصفحة + عرض الإيميل
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("userEmail").innerText = "📧 " + user.email;
      } else {
        window.location.href = "login.html";
      }
    });

    // 🚪 تسجيل الخروج
    window.logout = function () {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    };
  </script>

</body>
</html>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "aclds-app.firebaseapp.com",
  databaseURL: "https://aclds-app-default-rtdb.firebaseio.com/",
  projectId: "aclds-app",
  storageBucket: "aclds-app.appspot.com",
  messagingSenderId: "391599013116",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// function ajouter joueur
window.ajouterJoueur = function() {
  const nom = document.getElementById("nom").value;
  const age = document.getElementById("age").value;

  push(ref(db, "joueurs"), {
    nom: nom,
    age: age
  });

  alert("تمت الإضافة ✅");
}
</script>
<h2>إضافة لاعب</h2>

<input type="text" id="nom" placeholder="اسم اللاعب"><br><br>
<input type="number" id="age" placeholder="العمر"><br><br>

<button onclick="ajouterJoueur()">إضافة</button>
