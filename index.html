<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ACLDs PRO MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

input,select{
  padding:12px;
  margin:8px;
  width:85%;
  border-radius:12px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}

.main{background:#00c853;color:white;width:80%}
.card{background:#222;margin:10px;padding:15px;border-radius:12px}

.ok{color:#00ff88}
.no{color:red}
.exempt{color:orange}

.logout{
  position:fixed;
  bottom:10px;
  left:10px;
  background:red;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>🔐 تسجيل الدخول</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">دخول</button>
</div>

<!-- HOME -->
<div id="home" style="display:none">
<h1>⚽ ACLDs</h1>

<button class="main" onclick="go('add')">➕ إضافة لاعب</button><br>
<button class="main" onclick="go('players')">📋 اللاعبين</button><br>
<button class="main" onclick="go('monthly')">💰 شهري</button><br>
<button class="main" onclick="go('yearly')">📅 سنوي</button><br>
<button class="main" onclick="go('settings')">⚙️ الإعدادات</button>

<button class="logout" onclick="logout()">🚪 خروج</button>
</div>

<!-- ADD -->
<div id="add" style="display:none">
<h2>➕ لاعب</h2>
<input id="name" placeholder="الاسم"><br>
<input id="birth" type="date"><br>

<select id="category">
<option>U8</option>
<option>U10</option>
<option>U12</option>
<option>U15</option>
<option>U17</option>
<option>U20</option>
</select><br>

<select id="exempt">
<option value="no">عادي</option>
<option value="yes">معفى</option>
</select><br>

<button onclick="save()">💾 حفظ</button>
<button onclick="back()">⬅</button>
</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
<h2>📋 اللاعبين</h2>
<input id="search" placeholder="بحث..." onkeyup="searchPlayer()">
<div id="list"></div>
<button onclick="back()">⬅</button>
</div>

<!-- MONTHLY -->
<div id="monthly" style="display:none">
<h2>💰 الواجب الشهري</h2>

<select id="season" onchange="render()">
<option>2025/2026</option>
<option>2026/2027</option>
</select>

<div id="monthlyList"></div>
<button onclick="back()">⬅</button>
</div>

<!-- YEARLY -->
<div id="yearly" style="display:none">
<h2>📅 الواجب السنوي</h2>
<div id="yearlyList"></div>
<button onclick="back()">⬅</button>
</div>

<!-- SETTINGS -->
<div id="settings" style="display:none">
<h2>⚙️ الإعدادات</h2>
<input id="monthlyPrice" placeholder="ثمن الشهري"><br>
<input id="yearlyPrice" placeholder="ثمن السنوي"><br>
<button onclick="saveSettings()">💾 حفظ</button>
<button onclick="back()">⬅</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { getDatabase, ref, push, onValue, update, set } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc",
  authDomain: "aclds-app.firebaseapp.com",
  databaseURL: "https://aclds-app-default-rtdb.firebaseio.com",
  projectId: "aclds-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let data={}, settings={monthly:100, yearly:500};

window.login = ()=>{
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>alert("تم تسجيل الدخول ✅"))
  .catch(e=>alert(e.message));
}

window.logout = ()=> signOut(auth);

onAuthStateChanged(auth,user=>{
  login.style.display = user?"none":"block";
  home.style.display = user?"block":"none";
  if(user){load();loadSettings();}
});

window.go = p=>{
  ["home","add","players","monthly","yearly","settings"]
  .forEach(x=>document.getElementById(x).style.display="none");

  document.getElementById(p).style.display="block";
}

window.back = ()=>go("home");

function load(){
  onValue(ref(db,"players"),snap=>{
    data = snap.val()||{};
    render();
  });
}

function loadSettings(){
  onValue(ref(db,"settings"),snap=>{
    settings = snap.val() || {monthly:100,yearly:500};
    monthlyPrice.value=settings.monthly;
    yearlyPrice.value=settings.yearly;
  });
}

window.saveSettings = ()=>{
  set(ref(db,"settings"),{
    monthly:Number(monthlyPrice.value),
    yearly:Number(yearlyPrice.value)
  });
  alert("تم حفظ الإعدادات");
}

window.save = ()=>{
  let n=name.value;

  for(let id in data){
    if(data[id].name==n){
      alert("⚠️ الاسم موجود");
      return;
    }
  }

  push(ref(db,"players"),{
    name:n,
    birth:birth.value,
    category:category.value,
    exempt:exempt.value,
    yearly:"no",
    months:{}
  });

  alert("تمت الإضافة");
}

function render(){

  const months = ["09","10","11","12","01","02","03","04","05","06","07"];

  let listHTML="", mHTML="", yHTML="";

  for(let id in data){
    let p=data[id];

    listHTML+=`
    <div class="card">
    <b>${p.name}</b><br>
    🎂 ${p.birth}<br>
    🏷️ ${p.category}<br>
    ${p.exempt=="yes"?"<span class='exempt'>🚫 معفى</span>":""}
    </div>`;

    let monthsHTML="";

    if(p.exempt=="yes"){
      monthsHTML="🚫 معفى";
    }else{
      months.forEach(m=>{
        let paid = p.months?.[m]=="yes";
        monthsHTML+=`
        <button style="background:${paid?"green":"red"};color:white;width:45px"
        onclick="toggleMonth('${id}','${m}')">
        ${m}
        </button>`;
      });
    }

    mHTML+=`
    <div class="card">
    <b>${p.name}</b><br>
    ${monthsHTML}
    </div>`;

    yHTML+=`
    <div class="card">
    ${p.name}<br>
    ${p.exempt=="yes"?"🚫 معفى":
    `<span class="${p.yearly=='yes'?'ok':'no'}">
    ${p.yearly=='yes'?'✔️':'❌'}
    </span>
    <br>${settings.yearly} درهم
    <br><button onclick="payY('${id}')">تغيير</button>`}
    </div>`;
  }

  list.innerHTML=listHTML;
  monthlyList.innerHTML=mHTML;
  yearlyList.innerHTML=yHTML;
}

window.toggleMonth=(id,m)=>{
  let val = data[id].months?.[m]=="yes"?"no":"yes";
  update(ref(db,"players/"+id+"/months/"+m), val);
}

window.payY=id=>{
  let v=data[id].yearly=="yes"?"no":"yes";
  update(ref(db,"players/"+id),{yearly:v});
}

window.searchPlayer=()=>{
  let v=search.value.toLowerCase();
  let html="";
  for(let id in data){
    if(data[id].name.toLowerCase().includes(v)){
      html+=`<div class="card">${data[id].name}</div>`;
    }
  }
  list.innerHTML=html;
}

</script>

</body>
</html>
