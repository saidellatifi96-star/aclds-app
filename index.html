<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ACLDs</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:sans-serif;">

<h1>إضافة لاعب ⚽</h1>

<input type="text" id="nom" placeholder="اسم اللاعب"><br><br>
<input type="number" id="age" placeholder="العمر"><br><br>

<button onclick="ajouterJoueur()">إضافة</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc",
  authDomain: "aclds-app.firebaseapp.com",
  databaseURL: "https://aclds-app-default-rtdb.firebaseio.com/",
  projectId: "aclds-app",
  storageBucket: "aclds-app.appspot.com",
  messagingSenderId: "391599013116",
  appId: "1:391599013116:web:6cc068d28097a90bb9ab79"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// function إضافة لاعب
window.ajouterJoueur = function () {
  const nom = document.getElementById("nom").value;
  const age = document.getElementById("age").value;

  if (nom === "" || age === "") {
    alert("عمر الحقول ❗");
    return;
  }

  push(ref(db, "joueurs"), {
    nom: nom,
    age: age
  })
  .then(() => {
    alert("تمت الإضافة ✅");
    document.getElementById("nom").value = "";
    document.getElementById("age").value = "";
  })
  .catch((error) => {
    alert("خطأ: " + error);
    console.error(error);
  });
};
</script>

</body>
</html>
