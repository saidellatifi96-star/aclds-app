<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ACLDs PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

input,select{
  padding:12px;
  margin:8px;
  width:85%;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}

.main{background:#00c853;color:white;width:80%}
.card{background:#222;margin:10px;padding:15px;border-radius:10px}

.ok{color:#00ff88}
.no{color:red}
.exempt{color:orange}

.logout{
  position:fixed;
  bottom:10px;
  left:10px;
  background:red;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔐 تسجيل الدخول</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button id="loginBtn">دخول</button>
</div>

<!-- APP -->
<div id="appBox" style="display:none">

<h1>⚽ ACLDs</h1>

<button class="main" onclick="go('add')">➕ إضافة لاعب</button><br>
<button class="main" onclick="go('players')">📋 اللاعبين</button><br>
<button class="main" onclick="go('monthly')">💰 شهري</button><br>
<button class="main" onclick="go('yearly')">📅 سنوي</button>

<button class="logout" onclick="logout()">🚪 خروج</button>

<!-- ADD -->
<div id="add" style="display:none">
<h2>➕ لاعب</h2>
<input id="name" placeholder="الاسم"><br>
<input id="birth" type="date"><br>

<select id="category">
<option>U8</option>
<option>U10</option>
<option>U12</option>
<option>U15</option>
<option>U17</option>
</select><br>

<select id="exempt">
<option value="no">عادي</option>
<option value="yes">معفى</option>
</select><br>

<button onclick="save()">💾 حفظ</button>
</div>

<!-- PLAYERS -->
<div id="players" style="display:none">
<h2>📋 اللاعبين</h2>
<input id="search" placeholder="بحث..." onkeyup="searchPlayer()">
<div id="list"></div>
</div>

<!-- MONTHLY -->
<div id="monthly" style="display:none">
<h2>💰 الشهري</h2>
<div id="monthlyList"></div>
</div>

<!-- YEARLY -->
<div id="yearly" style="display:none">
<h2>📅 السنوي</h2>
<div id="yearlyList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { getDatabase, ref, push, onValue, update } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc",
  authDomain: "aclds-app.firebaseapp.com",
  databaseURL: "https://aclds-app-default-rtdb.firebaseio.com",
  projectId: "aclds-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let data = {};

// 🔥 LOGIN FIX
const loginBtn = document.getElementById("loginBtn");

loginBtn.addEventListener("click", ()=>{

  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();

  if(!email || !pass){
    alert("عمر المعلومات ❗");
    return;
  }

  signInWithEmailAndPassword(auth, email, pass)
  .then(()=> alert("تم تسجيل الدخول ✅"))
  .catch(e=> alert(e.message));
});

// LOGOUT
window.logout = ()=> signOut(auth);

// STATE
onAuthStateChanged(auth,user=>{
  document.getElementById("loginBox").style.display = user?"none":"block";
  document.getElementById("appBox").style.display = user?"block":"none";

  if(user) load();
});

// NAV
window.go = (page)=>{
  ["add","players","monthly","yearly"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(page).style.display="block";
};

// LOAD
function load(){
  onValue(ref(db,"players"),snap=>{
    data = snap.val() || {};
    render();
  });
}

// SAVE
window.save = ()=>{
  let name = document.getElementById("name").value;

  for(let id in data){
    if(data[id].name == name){
      alert("⚠️ اللاعب موجود");
      return;
    }
  }

  push(ref(db,"players"),{
    name,
    birth:birth.value,
    category:category.value,
    exempt:exempt.value,
    yearly:"no",
    months:{}
  });

  alert("تمت الإضافة");
};

// RENDER
function render(){

  let listHTML="", mHTML="", yHTML="";
  const months=["09","10","11","12","01","02","03","04","05","06","07"];

  for(let id in data){
    let p=data[id];

    listHTML+=`<div class="card">${p.name}</div>`;

    let m="";
    if(p.exempt=="yes"){
      m="🚫 معفى";
    }else{
      months.forEach(mon=>{
        let paid = p.months?.[mon]=="yes";
        m+=`<button style="background:${paid?"green":"red"}"
        onclick="toggleM('${id}','${mon}')">${mon}</button>`;
      });
    }

    mHTML+=`<div class="card">${p.name}<br>${m}</div>`;

    yHTML+=`<div class="card">
    ${p.name}<br>
    ${p.exempt=="yes"?"🚫 معفى":
    `<button onclick="toggleY('${id}')">
    ${p.yearly=="yes"?"✔️":"❌"}
    </button>`}
    </div>`;
  }

  list.innerHTML=listHTML;
  monthlyList.innerHTML=mHTML;
  yearlyList.innerHTML=yHTML;
}

// PAY
window.toggleM=(id,m)=>{
  let val = data[id].months?.[m]=="yes"?"no":"yes";
  update(ref(db,"players/"+id+"/months/"+m), val);
}

window.toggleY=id=>{
  let v=data[id].yearly=="yes"?"no":"yes";
  update(ref(db,"players/"+id),{yearly:v});
}

// SEARCH
window.searchPlayer=()=>{
  let v=search.value.toLowerCase();
  let html="";
  for(let id in data){
    if(data[id].name.toLowerCase().includes(v)){
      html+=`<div class="card">${data[id].name}</div>`;
    }
  }
  list.innerHTML=html;
}

</script>

</body>
</html>
