<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ACLDs PRO</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

.container{
  padding:15px;
  max-width:500px;
  margin:auto;
}

h1{text-align:center}

input,select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  width:100%;
  margin-top:10px;
  background:#22c55e;
  color:white;
  font-size:16px;
}

.card{
  background:#1e293b;
  padding:10px;
  margin:10px 0;
  border-radius:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.card img{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
}

.badge{
  padding:3px 8px;
  border-radius:8px;
  font-size:12px;
}

.ok{background:#16a34a}
.no{background:red}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>

</head>

<body>

<div class="container">

<h1>⚽ ACLDs PRO</h1>

<!-- LOGIN -->
<div id="login">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">دخول</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="top">
<h3>إضافة لاعب</h3>
<button onclick="logout()">خروج</button>
</div>

<input id="nom" placeholder="اسم اللاعب">
<input id="age" type="number" placeholder="العمر">

<select id="categorie">
<option>U10</option>
<option>U12</option>
<option>U15</option>
<option>U17</option>
</select>

<input type="date" id="date">

<input type="file" id="photo">

<select id="mensuel">
<option value="yes">خالص شهري</option>
<option value="no">مازال</option>
</select>

<select id="annuel">
<option value="yes">خالص سنوي</option>
<option value="no">مازال</option>
</select>

<button onclick="save()">➕ إضافة لاعب</button>

<hr>

<input id="search" placeholder="🔍 بحث..." onkeyup="searchPlayer()">

<h3>📊 اللاعبين</h3>
<div id="list"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { getDatabase, ref, push, onValue } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "PUT_YOUR_API_KEY_HERE",
  authDomain: "aclds-app.firebaseapp.com",
  databaseURL: "https://aclds-app-default-rtdb.firebaseio.com",
  projectId: "aclds-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let data = {};

// LOGIN
window.login = ()=>{
  signInWithEmailAndPassword(auth, email.value, password.value)
  .catch(e=>alert(e.message));
}

// LOGOUT
window.logout = ()=> signOut(auth);

// STATE
onAuthStateChanged(auth,user=>{
  login.style.display = user ? "none":"block";
  app.style.display = user ? "block":"none";
  if(user) load();
});

// LOAD
function load(){
  onValue(ref(db,"joueurs"), snap=>{
    data = snap.val() || {};
    render(data);
  });
}

// SAVE
window.save = async ()=>{

  const file = document.getElementById("photo").files[0];
  let photoURL = "";

  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      photoURL = e.target.result;
      addPlayer(photoURL);
    };
    reader.readAsDataURL(file);
  } else {
    addPlayer("");
  }
}

function addPlayer(photoURL){
  const player = {
    nom: nom.value,
    age: age.value,
    categorie: categorie.value,
    date: date.value,
    mensuel: mensuel.value,
    annuel: annuel.value,
    photo: photoURL
  };

  push(ref(db,"joueurs"), player);

  alert("تمت الإضافة ✅");

  nom.value="";
  age.value="";
}

// RENDER
function render(obj){
  list.innerHTML="";

  for(let id in obj){
    let j = obj[id];

    list.innerHTML += `
    <div class="card">
      <img src="${j.photo || 'https://via.placeholder.com/60'}">

      <div>
      <b>${j.nom}</b><br>
      🎂 ${j.age} سنة<br>
      🏷️ ${j.categorie}<br>
      📅 ${j.date || ''}<br>

      <span class="badge ${j.mensuel=='yes'?'ok':'no'}">
      شهري
      </span>

      <span class="badge ${j.annuel=='yes'?'ok':'no'}">
      سنوي
      </span>
      </div>
    </div>
    `;
  }
}

// SEARCH
window.searchPlayer = ()=>{
  let v = search.value.toLowerCase();
  let filtered = {};

  for(let id in data){
    if(data[id].nom.toLowerCase().includes(v)){
      filtered[id]=data[id];
    }
  }

  render(filtered);
}

</script>

</body>
</html>
