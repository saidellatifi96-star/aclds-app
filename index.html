<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ACLDs</title>

<style>
body{background:#111;color:white;text-align:center;font-family:Arial}
input{padding:10px;margin:5px;border-radius:8px;border:none}
button{padding:10px;border:none;border-radius:8px;background:#22c55e;color:black}
</style>
</head>

<body>

<h2>تسجيل الدخول</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button id="loginBtn">دخول</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc",
  authDomain: "aclds-app.firebaseapp.com",
  projectId: "aclds-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();

document.getElementById("loginBtn").onclick = ()=>{
  alert("تم الضغط 👍");

  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
  .then(()=> alert("تم تسجيل الدخول ✅"))
  .catch(e=> alert(e.message));
}

</script>

</body>
</html>
