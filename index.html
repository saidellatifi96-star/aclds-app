<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ACLDs PRO</title>

<style>
body {
  background:#0d0d0d;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container {
  max-width:400px;
  margin:auto;
}

input, select {
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:12px;
  border:none;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:5px;
}

.card {
  background:#1a1a1a;
  padding:10px;
  margin:10px;
  border-radius:12px;
}

img {
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
}

.ok {color:#00ff88}
.no {color:red}
</style>
</head>

<body>

<div class="container">

<h1>⚽ ACLDs PRO</h1>

<!-- LOGIN -->
<div id="login">
  <h2>تسجيل الدخول</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">دخول</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h2>➕ إضافة لاعب</h2>

<input id="nom" placeholder="اسم اللاعب">
<input id="age" type="number" placeholder="العمر">

<select id="categorie">
  <option>U10</option>
  <option>U12</option>
  <option>U15</option>
  <option>U17</option>
</select>

<input id="image" placeholder="رابط صورة اللاعب">

<select id="mensuel">
  <option value="yes">خالص شهري</option>
  <option value="no">مازال</option>
</select>

<select id="annuel">
  <option value="yes">خالص سنوي</option>
  <option value="no">مازال</option>
</select>

<input type="date" id="date">

<button onclick="save()">💾 حفظ</button>
<button onclick="logout()">🚪 خروج</button>

<hr>

<h3>🔍 بحث</h3>
<input id="search" onkeyup="searchPlayer()" placeholder="ابحث بالاسم">

<h3>📅 الأجندة</h3>
<div id="agenda"></div>

<h3>📋 اللاعبين</h3>
<div id="list"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import { getDatabase, ref, push, onValue } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiapiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc"
  authDomain: "aclds-app.firebaseapp.com",
  databaseURL: "https://aclds-app-default-rtdb.firebaseio.com",
  projectId: "aclds-app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let data = {};

// LOGIN
window.login = ()=>{
  signInWithEmailAndPassword(auth, email.value, password.value)
  .catch(e=>alert("خطأ: "+e.message));
}

// LOGOUT
window.logout = ()=> signOut(auth);

// STATE
onAuthStateChanged(auth,user=>{
  login.style.display = user ? "none":"block";
  app.style.display = user ? "block":"none";
  if(user) load();
});

// LOAD
function load(){
  onValue(ref(db,"joueurs"), snap=>{
    data = snap.val() || {};
    render(data);
    agenda();
  });
}

// SAVE
window.save = ()=>{
  push(ref(db,"joueurs"), {
    nom: nom.value,
    age: age.value,
    categorie: categorie.value,
    image: image.value,
    mensuel: mensuel.value,
    annuel: annuel.value,
    date: date.value
  });

  alert("تم الحفظ ✅");

  nom.value="";
  age.value="";
  image.value="";
}

// SHOW
function render(obj){
  list.innerHTML="";

  for(let id in obj){
    let j=obj[id];

    list.innerHTML += `
    <div class="card">
      <img src="${j.image || 'https://via.placeholder.com/80'}"><br>
      <b>${j.nom}</b><br>
      🎂 ${j.age}<br>
      🏷️ ${j.categorie}<br>

      💰 شهري:
      <span class="${j.mensuel=='yes'?'ok':'no'}">
      ${j.mensuel=='yes'?'✔️':'❌'}
      </span><br>

      📅 سنوي:
      <span class="${j.annuel=='yes'?'ok':'no'}">
      ${j.annuel=='yes'?'✔️':'❌'}
      </span><br>

      📆 ${j.date || ''}
    </div>
    `;
  }
}

// SEARCH
window.searchPlayer = ()=>{
  let v = search.value.toLowerCase();
  let f={};

  for(let id in data){
    if(data[id].nom.toLowerCase().includes(v)){
      f[id]=data[id];
    }
  }

  render(f);
}

// AGENDA
function agenda(){
  agenda.innerHTML="";

  for(let id in data){
    let j=data[id];

    if(j.date){
      agenda.innerHTML += `
      <div class="card">
      📅 ${j.date} - ${j.nom}
      </div>
      `;
    }
  }
}

</script>

</body>
</html>
