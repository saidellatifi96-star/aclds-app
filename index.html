<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ACLDs PRO MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

h1{margin:20px}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  margin:5px;
  cursor:pointer;
}

.main{
  width:90%;
  background:#00c853;
  color:white;
  font-size:16px;
}

.card{
  background:#1e1e1e;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.month{
  padding:8px;
  margin:3px;
  border-radius:8px;
  font-size:12px;
}

.green{background:#00c853}
.red{background:#c62828}

.stats{
  background:#111;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>⚽ ACLDs</h1>

<select id="seasonSelect" onchange="changeSeason()">
<option>2025/2026</option>
<option>2026/2027</option>
<option>2027/2028</option>
</select>

<br><br>

<button class="main" onclick="show('add')">➕ إضافة لاعب</button>
<button class="main" onclick="show('monthly')">💰 الشهري</button>
<button class="main" onclick="show('yearly')">📅 السنوي</button>

<div id="stats" class="stats"></div>

<!-- ADD -->
<div id="add" style="display:none">
<input id="name" placeholder="اسم اللاعب"><br>
<input id="birth" type="date"><br>

<select id="cat">
<option>U8</option>
<option>U10</option>
<option>U12</option>
<option>U15</option>
<option>U17</option>
</select><br>

<select id="exempt">
<option value="no">عادي</option>
<option value="yes">معفى</option>
</select><br>

<button onclick="save()">💾 حفظ</button>
</div>

<!-- MONTHLY -->
<div id="monthly"></div>

<!-- YEARLY -->
<div id="yearly"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc",
  authDomain: "aclds-app.firebaseapp.com",
  databaseURL: "https://aclds-app-default-rtdb.firebaseio.com",
  projectId: "aclds-app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data = {};
let season = "2025/2026";

const months=["09","10","11","12","01","02","03","04","05","06","07"];

// CHANGE SEASON
window.changeSeason = ()=>{
  season = seasonSelect.value;
  render();
};

// LOAD
onValue(ref(db,"players"),snap=>{
  data = snap.val() || {};
  render();
});

// SAVE PLAYER
window.save = ()=>{
  let name = nameInput.value;

  for(let id in data){
    if(data[id].name == name){
      alert("⚠️ اللاعب موجود");
      return;
    }
  }

  push(ref(db,"players"),{
    name,
    birth:birth.value,
    cat:cat.value,
    exempt:exempt.value,
    seasons:{}
  });

  alert("تمت الإضافة");
};

// RENDER
function render(){

let mHTML="", yHTML="";
let paidCount=0, total=0;

for(let id in data){
  let p=data[id];

  if(!p.seasons) p.seasons={};
  if(!p.seasons[season]) p.seasons[season]={months:{},yearly:"no"};

  let s = p.seasons[season];

  // MONTHS
  let m="";
  if(p.exempt=="yes"){
    m="🚫 معفى";
  }else{
    months.forEach(mon=>{
      let paid = s.months?.[mon]=="yes";
      if(paid) paidCount++;

      m+=`<button class="month ${paid?"green":"red"}"
      onclick="toggleM('${id}','${mon}')">${mon}</button>`;
    });

    total += Object.values(s.months||{}).filter(v=>v=="yes").length * 100;
  }

  mHTML+=`<div class="card">${p.name}<br>${m}</div>`;

  // YEARLY
  let y="";
  if(p.exempt=="yes"){
    y="🚫 معفى";
  }else{
    if(s.yearly=="yes"){paidCount++; total+=500;}
    y=`<button onclick="toggleY('${id}')">
    ${s.yearly=="yes"?"✔️":"❌"}
    </button>`;
  }

  yHTML+=`<div class="card">${p.name}<br>${y}</div>`;
}

// STATS
document.getElementById("stats").innerHTML = `
💰 المجموع: ${total} درهم <br>
✅ المؤدين: ${paidCount}
`;

monthly.innerHTML=mHTML;
yearly.innerHTML=yHTML;
}

// TOGGLE MONTH
window.toggleM=(id,m)=>{
  let path = `players/${id}/seasons/${season}/months/${m}`;
  let current = data[id].seasons?.[season]?.months?.[m];
  update(ref(db,path), current=="yes"?"no":"yes");
}

// TOGGLE YEAR
window.toggleY=id=>{
  let current = data[id].seasons?.[season]?.yearly;
  update(ref(db,`players/${id}/seasons/${season}`),{
    yearly: current=="yes"?"no":"yes"
  });
}

// NAV
window.show = (s)=>{
  add.style.display="none";
  monthly.style.display="none";
  yearly.style.display="none";

  document.getElementById(s).style.display="block";
}

</script>

</body>
</html>
