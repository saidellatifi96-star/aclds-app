<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{background:black;color:white;text-align:center;font-family:Arial}
input{padding:12px;margin:8px;width:250px;border-radius:10px;border:none}
button{padding:12px 20px;border:none;border-radius:10px;background:green;color:white}
</style>
</head>

<body>

<h2>تسجيل الدخول</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="loginBtn">دخول</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYgnrlmzmffzqvIfCfzngd9KMaWMhcDKc",
  authDomain: "aclds-app.firebaseapp.com",
  projectId: "aclds-app",
  databaseURL: "https://aclds-app-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

loginBtn.onclick = ()=>{
  signInWithEmailAndPassword(auth, email.value, password.value)
  .then(()=> window.location.href="home.html")
  .catch(e=> alert(e.message));
};

onAuthStateChanged(auth,user=>{
  if(user) window.location.href="home.html";
});
</script>

</body>
</html>
